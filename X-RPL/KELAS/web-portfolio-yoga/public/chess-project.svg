<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boardLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b3b5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a4a6a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boardDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#252545;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000080"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="80" fill="#06b6d420" />
  <circle cx="550" cy="350" r="100" fill="#8b5cf620" />
  
  <!-- Chess Board -->
  <g transform="translate(150, 50)" filter="url(#shadow)">
    <!-- Board border -->
    <rect x="-8" y="-8" width="316" height="316" rx="12" fill="#2a2a4a" stroke="#06b6d440" stroke-width="1"/>
    
    <!-- 8x8 grid -->
    <g>
      <!-- Row 0 -->
      <rect x="0" y="0" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="37.5" y="0" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="75" y="0" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="112.5" y="0" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="150" y="0" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="187.5" y="0" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="225" y="0" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="262.5" y="0" width="37.5" height="37.5" fill="#1e1e3a"/>
      <!-- Row 1 -->
      <rect x="0" y="37.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="37.5" y="37.5" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="75" y="37.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="112.5" y="37.5" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="150" y="37.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="187.5" y="37.5" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="225" y="37.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="262.5" y="37.5" width="37.5" height="37.5" fill="#4a4a6a"/>
      <!-- Row 2 -->
      <rect x="0" y="75" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="37.5" y="75" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="75" y="75" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="112.5" y="75" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="150" y="75" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="187.5" y="75" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="225" y="75" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="262.5" y="75" width="37.5" height="37.5" fill="#1e1e3a"/>
      <!-- Row 3 -->
      <rect x="0" y="112.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="37.5" y="112.5" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="75" y="112.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="112.5" y="112.5" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="150" y="112.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="187.5" y="112.5" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="225" y="112.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="262.5" y="112.5" width="37.5" height="37.5" fill="#4a4a6a"/>
      <!-- Row 4 -->
      <rect x="0" y="150" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="37.5" y="150" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="75" y="150" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="112.5" y="150" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="150" y="150" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="187.5" y="150" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="225" y="150" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="262.5" y="150" width="37.5" height="37.5" fill="#1e1e3a"/>
      <!-- Row 5 -->
      <rect x="0" y="187.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="37.5" y="187.5" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="75" y="187.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="112.5" y="187.5" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="150" y="187.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="187.5" y="187.5" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="225" y="187.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="262.5" y="187.5" width="37.5" height="37.5" fill="#4a4a6a"/>
      <!-- Row 6 -->
      <rect x="0" y="225" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="37.5" y="225" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="75" y="225" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="112.5" y="225" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="150" y="225" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="187.5" y="225" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="225" y="225" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="262.5" y="225" width="37.5" height="37.5" fill="#1e1e3a"/>
      <!-- Row 7 -->
      <rect x="0" y="262.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="37.5" y="262.5" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="75" y="262.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="112.5" y="262.5" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="150" y="262.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="187.5" y="262.5" width="37.5" height="37.5" fill="#4a4a6a"/><rect x="225" y="262.5" width="37.5" height="37.5" fill="#1e1e3a"/><rect x="262.5" y="262.5" width="37.5" height="37.5" fill="#4a4a6a"/>
    </g>
    
    <!-- Chess pieces (simplified unicode style) -->
    <!-- Black pieces row 0 -->
    <text x="18.75" y="28" text-anchor="middle" font-size="28" fill="#c084fc" filter="url(#glow)">♜</text>
    <text x="56.25" y="28" text-anchor="middle" font-size="28" fill="#c084fc" filter="url(#glow)">♞</text>
    <text x="93.75" y="28" text-anchor="middle" font-size="28" fill="#c084fc" filter="url(#glow)">♝</text>
    <text x="131.25" y="28" text-anchor="middle" font-size="28" fill="#c084fc" filter="url(#glow)">♛</text>
    <text x="168.75" y="28" text-anchor="middle" font-size="28" fill="#c084fc" filter="url(#glow)">♚</text>
    <text x="206.25" y="28" text-anchor="middle" font-size="28" fill="#c084fc" filter="url(#glow)">♝</text>
    <text x="243.75" y="28" text-anchor="middle" font-size="28" fill="#c084fc" filter="url(#glow)">♞</text>
    <text x="281.25" y="28" text-anchor="middle" font-size="28" fill="#c084fc" filter="url(#glow)">♜</text>
    <!-- Black pawns row 1 -->
    <text x="18.75" y="66" text-anchor="middle" font-size="24" fill="#a78bfa">♟</text>
    <text x="56.25" y="66" text-anchor="middle" font-size="24" fill="#a78bfa">♟</text>
    <text x="93.75" y="66" text-anchor="middle" font-size="24" fill="#a78bfa">♟</text>
    <text x="131.25" y="66" text-anchor="middle" font-size="24" fill="#a78bfa">♟</text>
    <text x="168.75" y="66" text-anchor="middle" font-size="24" fill="#a78bfa">♟</text>
    <text x="206.25" y="66" text-anchor="middle" font-size="24" fill="#a78bfa">♟</text>
    <text x="243.75" y="66" text-anchor="middle" font-size="24" fill="#a78bfa">♟</text>
    <text x="281.25" y="66" text-anchor="middle" font-size="24" fill="#a78bfa">♟</text>
    <!-- White pawns row 6 -->
    <text x="18.75" y="253" text-anchor="middle" font-size="24" fill="#22d3ee">♙</text>
    <text x="56.25" y="253" text-anchor="middle" font-size="24" fill="#22d3ee">♙</text>
    <text x="93.75" y="253" text-anchor="middle" font-size="24" fill="#22d3ee">♙</text>
    <text x="131.25" y="253" text-anchor="middle" font-size="24" fill="#22d3ee">♙</text>
    <text x="168.75" y="253" text-anchor="middle" font-size="24" fill="#22d3ee">♙</text>
    <text x="206.25" y="253" text-anchor="middle" font-size="24" fill="#22d3ee">♙</text>
    <text x="243.75" y="253" text-anchor="middle" font-size="24" fill="#22d3ee">♙</text>
    <text x="281.25" y="253" text-anchor="middle" font-size="24" fill="#22d3ee">♙</text>
    <!-- White pieces row 7 -->
    <text x="18.75" y="291" text-anchor="middle" font-size="28" fill="#06b6d4" filter="url(#glow)">♖</text>
    <text x="56.25" y="291" text-anchor="middle" font-size="28" fill="#06b6d4" filter="url(#glow)">♘</text>
    <text x="93.75" y="291" text-anchor="middle" font-size="28" fill="#06b6d4" filter="url(#glow)">♗</text>
    <text x="131.25" y="291" text-anchor="middle" font-size="28" fill="#06b6d4" filter="url(#glow)">♕</text>
    <text x="168.75" y="291" text-anchor="middle" font-size="28" fill="#06b6d4" filter="url(#glow)">♔</text>
    <text x="206.25" y="291" text-anchor="middle" font-size="28" fill="#06b6d4" filter="url(#glow)">♗</text>
    <text x="243.75" y="291" text-anchor="middle" font-size="28" fill="#06b6d4" filter="url(#glow)">♘</text>
    <text x="281.25" y="291" text-anchor="middle" font-size="28" fill="#06b6d4" filter="url(#glow)">♖</text>
    
    <!-- Highlight square -->
    <rect x="112.5" y="150" width="37.5" height="37.5" fill="#06b6d430" stroke="#06b6d4" stroke-width="2" rx="2"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="380" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#e4e4e7" letter-spacing="2">DIGITAL CHESS</text>
</svg>
