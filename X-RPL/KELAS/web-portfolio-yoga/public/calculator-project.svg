<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="calcBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="display" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111128;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="btnCyan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="btnPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000060"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg2)"/>
  
  <!-- Decorative circles -->
  <circle cx="520" cy="60" r="90" fill="#06b6d415" />
  <circle cx="80" cy="340" r="70" fill="#8b5cf615" />
  
  <!-- Calculator body -->
  <g transform="translate(175, 20)" filter="url(#shadow2)">
    <rect width="250" height="350" rx="24" fill="url(#calcBody)" stroke="#ffffff10" stroke-width="1"/>
    
    <!-- Display -->
    <rect x="20" y="20" width="210" height="80" rx="16" fill="url(#display)" stroke="#06b6d430" stroke-width="1"/>
    <text x="215" y="55" text-anchor="end" font-family="monospace" font-size="14" fill="#a1a1aa">123 + 456</text>
    <text x="215" y="82" text-anchor="end" font-family="monospace" font-size="32" font-weight="bold" fill="#22d3ee" filter="url(#glow2)">579</text>
    
    <!-- Button grid -->
    <!-- Row 1: AC, +/-, %, ÷ -->
    <rect x="20" y="115" width="45" height="42" rx="12" fill="#3b3b5c"/><text x="42.5" y="142" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f87171">AC</text>
    <rect x="75" y="115" width="45" height="42" rx="12" fill="#3b3b5c"/><text x="97.5" y="142" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#e4e4e7">±</text>
    <rect x="130" y="115" width="45" height="42" rx="12" fill="#3b3b5c"/><text x="152.5" y="142" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#e4e4e7">%</text>
    <rect x="185" y="115" width="45" height="42" rx="12" fill="url(#btnPurple)"/><text x="207.5" y="142" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">÷</text>
    
    <!-- Row 2: 7, 8, 9, × -->
    <rect x="20" y="167" width="45" height="42" rx="12" fill="#2a2a4a" stroke="#ffffff10" stroke-width="1"/><text x="42.5" y="194" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e4e4e7">7</text>
    <rect x="75" y="167" width="45" height="42" rx="12" fill="#2a2a4a" stroke="#ffffff10" stroke-width="1"/><text x="97.5" y="194" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e4e4e7">8</text>
    <rect x="130" y="167" width="45" height="42" rx="12" fill="#2a2a4a" stroke="#ffffff10" stroke-width="1"/><text x="152.5" y="194" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e4e4e7">9</text>
    <rect x="185" y="167" width="45" height="42" rx="12" fill="url(#btnPurple)"/><text x="207.5" y="194" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">×</text>
    
    <!-- Row 3: 4, 5, 6, - -->
    <rect x="20" y="219" width="45" height="42" rx="12" fill="#2a2a4a" stroke="#ffffff10" stroke-width="1"/><text x="42.5" y="246" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e4e4e7">4</text>
    <rect x="75" y="219" width="45" height="42" rx="12" fill="#2a2a4a" stroke="#ffffff10" stroke-width="1"/><text x="97.5" y="246" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e4e4e7">5</text>
    <rect x="130" y="219" width="45" height="42" rx="12" fill="#2a2a4a" stroke="#ffffff10" stroke-width="1"/><text x="152.5" y="246" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e4e4e7">6</text>
    <rect x="185" y="219" width="45" height="42" rx="12" fill="url(#btnPurple)"/><text x="207.5" y="246" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">−</text>
    
    <!-- Row 4: 1, 2, 3, + -->
    <rect x="20" y="271" width="45" height="42" rx="12" fill="#2a2a4a" stroke="#ffffff10" stroke-width="1"/><text x="42.5" y="298" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e4e4e7">1</text>
    <rect x="75" y="271" width="45" height="42" rx="12" fill="#2a2a4a" stroke="#ffffff10" stroke-width="1"/><text x="97.5" y="298" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e4e4e7">2</text>
    <rect x="130" y="271" width="45" height="42" rx="12" fill="#2a2a4a" stroke="#ffffff10" stroke-width="1"/><text x="152.5" y="298" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e4e4e7">3</text>
    <rect x="185" y="271" width="45" height="42" rx="12" fill="url(#btnPurple)"/><text x="207.5" y="298" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">+</text>
    
    <!-- Row 5: 0, ., = -->
    <rect x="20" y="323" width="100" height="42" rx="12" fill="#2a2a4a" stroke="#ffffff10" stroke-width="1"/><text x="70" y="350" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e4e4e7">0</text>
    <rect x="130" y="323" width="45" height="42" rx="12" fill="#2a2a4a" stroke="#ffffff10" stroke-width="1"/><text x="152.5" y="350" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e4e4e7">.</text>
    <rect x="185" y="323" width="45" height="42" rx="12" fill="url(#btnCyan)"/><text x="207.5" y="350" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">=</text>
  </g>
</svg>
